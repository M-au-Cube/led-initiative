        title_en: "Massive reduction of energy consumption"
        summary_fr: "Réduction massive de la consommation énergétique nationale (isolation systématique, pompes à chaleur, véhicules moins rapides et plus légers, projets BTP durables, etc.)."
        summary_en: "Massive reduction of national energy consumption (systematic insulation, heat pumps, slower and lighter vehicles, sustainable construction projects, etc.)."
      - id: amenagement-territoire
