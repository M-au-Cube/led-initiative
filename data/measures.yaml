# Données du programme LED — source unique pour le site, les PDFs et le vote
# Présidentielle française 2027

manifeste_url: "https://www.change.org/"  # À remplacer par l'URL de pétition réelle

sections:
  - id: liberte
    title_fr: "I. Liberté"
    title_en: "I. Liberty"
    measures:
      - id: liberte-economique
        title_fr: "Liberté économique et mesures libérales (ESG)"
        title_en: "Economic liberty and liberal measures (ESG)"
        summary_fr: "Liberté économique et mesures libérales, dans le respect de contraintes durables (Environnemental, Social, Gouvernance)."
        summary_en: "Economic liberty and liberal measures, within sustainable constraints (Environmental, Social, Governance)."
      - id: limites-consommation
        title_fr: "Limites individuelles de consommation de ressources"
        title_en: "Individual limits on resource consumption"
        summary_fr: "Mise en place de limites individuelles de consommation de ressources (eau, énergie, etc.)."
        summary_en: "Implementation of individual limits on resource consumption (water, energy, etc.)."
      - id: limites-ethiques
        title_fr: "Limites éthiques sur les technologies et la vie"
        title_en: "Ethical limits on technology and life"
        summary_fr: "Définition de limites éthiques sur : procréation, assistance au suicide, humain augmenté, allongement de la durée de vie, IA dans la défense, conquête spatiale."
        summary_en: "Definition of ethical limits on: procreation, assisted suicide, augmented humans, life extension, AI in defense, space conquest."
      - id: production-francaise
        title_fr: "Priorité à la production française et européenne"
        title_en: "Priority for French and European production"
        summary_fr: "Priorité à la production française et européenne ; recours à des droits de douane sur les secteurs stratégiques si nécessaire."
        summary_en: "Priority for French and European production; use of tariffs on strategic sectors when necessary."

  - id: environnement
