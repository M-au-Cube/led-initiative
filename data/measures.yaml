        summary_en: "Penalties for projects deemed too fast or insufficiently sustainable."
      - id: traditions-anciens
        title_fr: "Respect des anciens et transmission des traditions"
        title_en: "Respect for elders and transmission of traditions"
        summary_fr: "Respect des anciens et transmission des traditions."
        summary_en: "Respect for elders and transmission of traditions."
      - id: agriculture-bio
        title_fr: "Retour à une agriculture majoritairement biologique"
        title_en: "Return to predominantly organic agriculture"
        summary_fr: "Retour à une agriculture majoritairement biologique."
        summary_en: "Return to predominantly organic agriculture."
      - id: droits-douane-env
        title_fr: "Droits de douane environnementaux"
        title_en: "Environmental tariffs"
        summary_fr: "Droits de douane environnementaux pour les produits ne respectant pas les normes françaises ou européennes."
        summary_en: "Environmental tariffs for products not meeting French or European standards."
      - id: transports-eco
        title_fr: "Réorganisation des transports"
        title_en: "Transport reorganization"
        summary_fr: "Réorganisation des transports : priorité au ferroviaire, développement du partage automobile, limitation du transport aérien."
        summary_en: "Transport reorganization: rail priority, car-sharing development, limitation of air transport."

